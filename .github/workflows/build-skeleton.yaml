name: Build Skeleton
on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Target tag for re-upload'
        required: true
        default: ''
      admin:
        description: 'Create also a package with Admin'
        required: false
        default: false
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Extract Tag
        run: echo "SKELETON_VERSION=${{ github.event.inputs.tag || github.ref_name }}" >> $GITHUB_ENV
      # Swap in the 2.0-specific dependencies (admin2 + api instead of
      # classic admin) before the 2.0 build runs, backing up the original.
      - name: Swap in 2.0 dependencies
        run: |
          cp .dependencies .dependencies.bak
          cp .dependencies-2.0 .dependencies
      # 1. Build latest (2.0) FIRST, using the fork (PHP 8.3) since
      #    Grav 1.8+ requires it. Plain/unversioned filename for now.
      - name: Generate Skeleton Packages (latest / 2.0)
        uses: paulhibbitts/skeleton-builder@main
        with:
          version: 'latest'
          admin: ${{ github.event.inputs.admin || false }}
          exclude: README.md .dependencies-2.0 .dependencies.bak
          filename_version: false
      # Restore the original (1.7.x-compatible) dependencies before
      # the next build step runs.
      - name: Restore original dependencies
        run: mv .dependencies.bak .dependencies
      # 2. Rename the 2.0 output by inserting "2-" right after the
      #    "grav-" prefix, then move it OUT of dist/ entirely -- the
      #    next build step needs to create dist/ fresh, and will
      #    fail if it already exists.
      - name: Stash renamed 2.0 build output
        run: |
          mkdir -p dist-2
          cd dist
          for f in *.zip; do
            newname=$(echo "$f" | sed 's/^grav-/grav-2-/')
            sudo mv "$f" "../dist-2/$newname"
          done
          cd ..
          sudo rmdir dist
      # 3. Build the pinned 1.7.53.2 version LAST, using the original
      #    upstream action (PHP 7.4, proven stable for this version).
      #    Plain/unversioned filename matches your existing convention.
      - name: Generate Skeleton Packages (1.7.53.2)
        uses: getgrav/skeleton-builder@v1
        with:
          version: '1.7.53.2'
          admin: ${{ github.event.inputs.admin || false }}
          exclude: README.md *dist-2/* .dependencies-2.0
          filename_version: false
      # 4. Upload the 2.0 (-2 prefixed) packages FIRST.
      - name: Upload 2.0 packages to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ env.SKELETON_VERSION }}
          file: dist-2/*.zip
          overwrite: true
          file_glob: true
      # 5. Upload the 1.7.53.2 (plain-named) packages LAST, so it's the
      #    most recently added asset -- this is what getgrav.org's
      #    indexer appears to pick up automatically.
      - name: Upload 1.7.53.2 packages to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ env.SKELETON_VERSION }}
          file: dist/*.zip
          overwrite: true
          file_glob: true
